name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: sentra
            archive_name: sentra-linux-x86_64-musl
            zigbuild: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: sentra
            archive_name: sentra-linux-aarch64-musl
            zigbuild: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sentra.exe
            archive_name: sentra-windows-x86_64-static
            rustflags: -C target-feature=+crt-static
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sentra
            archive_name: sentra-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sentra
            archive_name: sentra-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [[ "${{ matrix.zigbuild }}" == "true" ]]; then
            cargo zigbuild --locked --release --target ${{ matrix.target }} --bin sentra
          else
            cargo build --locked --release --target ${{ matrix.target }} --bin sentra
          fi
        shell: bash

      - name: Stage archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.archive_name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.archive_name }}/"
          cp README.md LICENSE "dist/${{ matrix.archive_name }}/"
          cd dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${{ matrix.archive_name }}.zip" "${{ matrix.archive_name }}"
          else
            tar -czf "${{ matrix.archive_name }}.tar.gz" "${{ matrix.archive_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            dist/${{ matrix.archive_name }}.tar.gz
            dist/${{ matrix.archive_name }}.zip
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
            scripts/install.sh
            scripts/install.ps1
